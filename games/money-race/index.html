function seededShuffle(a,seed){a=a.slice();let s=(seed||1)>>>0;const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buyableHTML(money,seed){
  const aff=CATALOG.filter(it=>it.price<=money).sort((a,b)=>b.price-a.price);
  if(!aff.length)return '<div class="buyShelf"><div class="buyItem"><span class="buyNm sub">まだ何も買えない…</span></div></div>';
  const it=aff[0]; // 所持金に一番近い(=今いちばん高く買える)1つ
  return '<div class="buyShelf"><div class="buyHd small sub">今これが買える</div><div class="buyItem"><span class="buyIco">'+it.e+'</span><span class="buyNm">'+esc(it.n)+'</span><span class="buyPr">'+jpyShort(it.price)+'</span></div></div>';
}
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const yen=n=>(n<0?'−':'')+Math.abs(Math.round(n)).toLocaleString('ja-JP')+'円';
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function led(v,size,cls=''){return '<span class="led '+cls+'" style="font-size:'+size+'px">'+v+'</span>';}
function pbadge(n,size=26){const c=PCOL[n]||PCOL[1];return '<span class="pbadge" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*.5)+'px;background:'+c.bg+';color:'+c.fg+'">'+n+'</span>';}
function tierIndex(money){let i=0;for(let k=0;k<TIERS.length;k++){if(money>=TIERS[k].min)i=k;else break;}return i;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rollTierItems(){return TIERS.map((t,i)=>{const n=Math.min(4+Math.min(i,2),t.pool.length);return shuffle(t.pool).slice(0,n);});}
function assetShelf(items){return '<div class="assetShelf">'+(items||[]).map(x=>'<span class="assetIcon">'+x+'</span>').join('')+'</div>';}

/* ============================================================
   ロビー / ゲーム生成
   ============================================================ */
function makeLobby(mode,hostName){
  const seats=[];
  for(let i=0;i<4;i++){
    if(i===0) seats.push({name:hostName||"あなた",kind:"human",level:0,owner:MP.clientId});
    else if(mode==="offline") seats.push({name:"CPU "+i,kind:"cpu",level:Math.min(i-1,2),owner:null});
    else seats.push({name:"参加者"+i,kind:"open",level:1,owner:null});
  }
  return {phase:"lobby",mode,hostId:MP.clientId,hostName:hostName||"あなた",
    count: mode==="offline"?1:2, maxRounds:30, startMoney:DEFAULT_START, winP:0.8, seats};
}
function makeGame(cfg){
  const players=cfg.seats.map((st,i)=>({
    id:i, name: st.kind==="human"?(st.name||("P"+(i+1))):CPU_LV[CPUKEY[st.level||0]].label,
    isCPU: st.kind!=="human", cpuLevel:CPUKEY[st.level||0], owner: st.kind==="human"?st.owner:null,
    wallet:cfg.startMoney, peak:cfg.startMoney, out:false, decided:false, frac:null, res:null,
    mood:{heat:0,streak:0,last:0}
  }));
  const s={phase:"decide",mode:cfg.mode,hostId:cfg.hostId,hostName:cfg.hostName,
    winP:cfg.winP,maxRounds:cfg.maxRounds,startMoney:cfg.startMoney,
    round:1,players,shopSeed:Math.floor(Math.random()*1e9)};
  beginRound(s); if(allDecided(s)) s.phase="judging"; return s;
}
function beginRound(s){
  s.players.forEach((p,i)=>{ p.res=null;
    if(p.out||p.wallet<=0){p.out=true;p.decided=true;p.frac=0;p.wallet=Math.max(0,p.wallet);}
    else if(p.isCPU){p.frac=cpuChallenge(s,i);p.decided=true;}
    else{p.decided=false;p.frac=null;}
  });
  s.phase="decide";
}
const allDecided=s=>s.players.every(p=>p.decided);
function applyResults(s){
  const win0=Math.random()<s.winP; // 全員共通の判定（公平）
  s.players.forEach(p=>{
    if(p.out){p.res={action:'out',win:null,bet:0,frac:0,before:p.wallet,after:p.wallet,tierUp:false};return;}
    const before=p.wallet, f=p.frac||0, bet=Math.floor(before*f);
    let win=null, after=before;
    if(bet>0){ win=win0; after=win?before+bet:before-bet; if(after<0)after=0; }
    p.wallet=after; const tierUp=tierIndex(after)>tierIndex(before);
    if(after>p.peak)p.peak=after; if(after<=0)p.out=true;
    p.res={action:bet>0?'bet':'skip',win:bet>0?win:null,bet,frac:f,before,after,tierUp};
  });
  s.phase="reveal";
}
function advance(s){ const anyOut=s.players.some(p=>p.out);
  if(s.round>=s.maxRounds||anyOut){ s.phase="end"; return; }
  s.round++; beginRound(s); if(allDecided(s)) s.phase="judging";
}
function cpuChallenge(s,seat){
  const p=s.players[seat], m=p.wallet; if(m<=0)return 0;
  const lv=CPU_LV[p.cpuLevel]||CPU_LV.hot, mood=p.mood||{heat:0};
  const left=Math.max(1,s.maxRounds-s.round+1), kelly=clamp(s.winP*2-1,0,1);
  let f=kelly+lv.riskBias+(mood.heat||0);
  const alive=[]; s.players.forEach((q,i)=>{if(!q.out)alive.push(i);});
  alive.sort((a,b)=>s.players[b].wallet-s.players[a].wallet);
  const myRank=alive.indexOf(seat);
  if(myRank>0){const leader=alive[0];const gap=(s.players[leader].wallet-p.wallet)/Math.max(1,s.players[leader].wallet);f+=gap*lv.chase;if(left<=3)f+=lv.endPush*(4-left)/3;}
  else if(alive[1]){const lead=(p.wallet-s.players[alive[1]].wallet)/Math.max(1,p.wallet);f-=lead*lv.protect;}
  if(Math.random()<lv.mistake)f+=(Math.random()<.5?-.25:.25);
  f+=(Math.random()-.5)*lv.noise*2;
  return clamp(Math.round(clamp(f,0,1)*10)/10,0,1);
}

/* ============================================================
   アクション適用（ホストのみ実行）
   ============================================================ */
const HOST_ACTS=["setcount","setrounds","settype","setlevel","setname","setstart","setwinp","startgame","restart"];
function applyAction(s,a){
  if(!s) return;
  if(HOST_ACTS.includes(a.type)&&a._by!==s.hostId) return;
  if(s.phase==="lobby"){
    if(a.type==="setcount") s.count=clamp(+a.n,1,4);
    else if(a.type==="setrounds") s.maxRounds=clamp(+a.v,3,MAX_ROUNDS);
    else if(a.type==="setstart") s.startMoney=clamp(+a.v,1,100000000);
    else if(a.type==="setwinp") s.winP=clamp(+a.v,0.05,0.95);
    else if(a.type==="settype"){const st=s.seats[a.i];if(st){st.kind=a.kind;if(a.kind!=="human")st.owner=null;}}
    else if(a.type==="setlevel"){const st=s.seats[a.i];if(st)st.level=+a.lv;}
    else if(a.type==="setname"){const st=s.seats[a.i];if(st)st.name=String(a.name||"").slice(0,12);}
    else if(a.type==="claimSeat"){const i=+a.seat,st=s.seats[i];if(i<s.count&&st&&st.kind==="open"){s.seats.forEach((o,j)=>{if(j>0&&o.owner===a._by){o.kind="open";o.owner=null;o.name="参加者"+j;}});st.kind="human";st.owner=a._by;st.name=String(a.name||"参加者").slice(0,12);}}
    else if(a.type==="releaseSeat"){const i=+a.seat,st=s.seats[i];if(i>0&&st&&st.owner===a._by){st.kind="open";st.owner=null;st.name="参加者"+i;}}
    else if(a.type==="startgame"){
      const seats=s.seats.slice(0,s.count).map((st,i)=> st.kind==="open"?{kind:"cpu",level:st.level||1,name:""}:st);
      const ns=makeGame({seats,startMoney:s.startMoney,maxRounds:s.maxRounds,winP:s.winP,mode:s.mode,hostId:s.hostId,hostName:s.hostName});
      Object.keys(s).forEach(k=>delete s[k]); Object.assign(s,ns);
    }
    return;
  }
  if(a.type==="restart"){ const lob=makeLobby(s.mode,s.hostName||"あなた"); Object.keys(s).forEach(k=>delete s[k]); Object.assign(s,lob); return; }
  if(a.type==="decide"){ if(s.phase!=="decide")return; const p=s.players[a.seat]; if(!p||p.isCPU||p.out||p.decided)return; p.frac=clamp(+a.frac,0,1); p.decided=true; if(allDecided(s))s.phase="judging"; return; }
  if(a.type==="next"){ if(s.phase!=="reveal")return; advance(s); return; }
}
function submit(a){ a=Object.assign({_by:MP.clientId},a); if(MP.isHost){applyAction(state,a);commit();} else MP.sendAction(a); }

/* ============================================================
   席・自分の判定
   ============================================================ */
function updateMySeat(){ if(!state){net.mySeat=null;return;}
  if(net.localControlsAll){net.mySeat=0;return;}
  const arr=state.phase==="lobby"?state.seats:state.players;
  if(!arr){net.mySeat=null;return;}
  const i=arr.findIndex(x=>x&&x.owner===MP.clientId); net.mySeat=i>=0?i:null;
}
function myPlayerIndex(){ if(net.localControlsAll)return 0; return net.mySeat!=null?net.mySeat:0; }
function activeDecideSeat(){
  if(!state||state.phase!=="decide")return null;
  if(net.localControlsAll){ for(let i=0;i<state.players.length;i++){const p=state.players[i];if(!p.isCPU&&!p.out&&!p.decided)return i;} return null; }
  const i=net.mySeat; if(i==null)return null; const p=state.players[i];
  return (p&&!p.isCPU&&!p.out&&!p.decided)?i:null;
}

function screenShake(){document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),520);}
function coinBurst(n){for(let i=0;i<n;i++){const el=document.createElement('span');el.className='coinFx';el.textContent=Math.random()<.5?'🪙':'💴';el.style.left=(42+Math.random()*16)+'%';el.style.top='52%';el.style.setProperty('--dx',(Math.random()*280-140)+'px');el.style.setProperty('--dy',(-140-Math.random()*200)+'px');el.style.animationDelay=(Math.random()*.14)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),1150);}}
function bigPop(text,tier){const el=document.createElement('div');el.className='bigPop';el.textContent=text;el.style.color=TIERS[tier].accent;document.body.appendChild(el);setTimeout(()=>el.remove(),1300);}
function triggerRevealFx(){
  const p=state.players[myPlayerIndex()]; if(!p||!p.res)return; const r=p.res;
  if(r.action==='bet'&&r.win){ const tier=tierIndex(r.after);
    coinBurst(8+tier*2); screenFlash('radial-gradient(circle at 50% 45%, '+TIERS[tier].accent+'66, transparent 70%)');
    bigPop('+'+yen(r.bet),tier); if(r.frac>=0.6||r.bet>=r.before)screenShake();
    if(r.tierUp){screenFlash('rgba(255,255,255,.35)');coinBurst(10);}
  } else if(r.action==='bet'&&!r.win){ screenFlash('radial-gradient(circle at 50% 45%, rgba(255,60,60,.45), transparent 70%)'); }
}

  const grad='linear-gradient(135deg,'+t.sky[0]+','+t.sky[1]+')';
  const spark=idx>=4?'<span class="wcSpark">✨</span>':'';
  const peakLine=(peak!=null)?'<div class="wcPeak led g">最高到達 '+yen(peak)+'</div>':'';
  return '<div class="wealthCard" style="background:'+grad+';border-color:'+t.accent+';box-shadow:0 0 '+(20+idx*4)+'px '+t.accent+'40 inset,0 6px 18px rgba(0,0,0,.4);"><span class="wcAsset" style="font-size:'+(44+idx*7)+'px;opacity:.92;">'+t.emoji+'</span>'+spark+'<div class="wcTier" style="color:'+t.accent+';">RANK '+(idx+1)+' ／ '+esc(t.name)+'</div><div class="wcMoney">'+led(yen(money),28,money>0?'':'w')+'</div>'+peakLine+buyableHTML(money,(state&&state.shopSeed)||1)+'<div class="wcBar"><div class="wcFill" style="width:'+prog+'%;background:'+t.accent+';box-shadow:0 0 10px '+t.accent+';"></div></div><div class="wcNext small" style="color:'+t.accent+'cc;">'+esc(ptext)+'</div></div>';}

    +wealthCard(state.startMoney,null)
    +'<div class="panel storyPanel"><div class="storyTitle">CHALLENGE RACE</div><p>所持金の何%を賭けるか毎ラウンド決めるだけ。'+Math.round(state.winP*100)+'%で増・残りで減。<b style="color:#ffd76a">これまでの最高到達金額</b>で競います。ゼロになると脱落、記録はそこで確定。</p></div>'
    +'<div class="panel"><b style="font-size:13px;">人数</b><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">'+cnt+'</div><div class="hr"></div><b style="font-size:13px;">レース回数（最大'+MAX_ROUNDS+'）</b><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">'+rnd+'</div><div class="hr"></div><div class="small sub">'+startMoneyLabel()+'（変更は⚙＋パスワード）</div></div>'
    +'<div class="panel"><b style="font-size:13px;">プレイヤー</b>'+rows+'</div>'
    +'<button class="btn primary" onclick="G.startGame()">チャレンジ開始</button>';
}
function vLobbyOnline(){
  const isHost=MP.isHost;
  let rows='';
  state.seats.slice(0,state.count).forEach((r,i)=>{
    const mine=r.owner===MP.clientId;let who,ctrl='';
    if(r.kind==="human")who='<span class="nm">'+esc(r.name)+(mine?' <span class="led c">(あなた)</span>':'')+(i===0?' <span class="small sub">ホスト</span>':'')+'</span>';
    else if(r.kind==="cpu")who='<span class="nm">CPU <span class="small sub">'+LEVELS[r.level||0]+'</span></span>';
    else who='<span class="nm sub">空席（参加待ち）</span>';
    if(isHost&&i>0)ctrl='<div style="display:flex;gap:5px;"><button class="btn mini '+(r.kind==="open"?'on':'')+'" onclick="G.setType('+i+',\'open\')">空</button><button class="btn mini '+(r.kind==="cpu"?'on':'')+'" onclick="G.setType('+i+',\'cpu\')">CPU</button></div>';
    else if(!isHost){ if(r.kind==="open")ctrl='<button class="btn mini on" onclick="G.claim('+i+')">座る</button>'; else if(mine)ctrl='<button class="btn mini" onclick="G.release('+i+')">離席</button>'; }
    rows+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-top:'+(i?'1px solid var(--line)':'0')+';">'+pbadge(i+1,24)+who+ctrl+'</div>';
    if(isHost&&r.kind==="cpu"&&i>0)rows+='<div style="display:flex;gap:5px;justify-content:flex-end;padding-bottom:6px;">'+LEVELS.map((lab,lv)=>'<button class="btn mini '+(r.level===lv?'on':'')+'" onclick="G.setLevel('+i+','+lv+')">'+lab+'</button>').join('')+'</div>';
  });
  const peers=[net.myName||state.hostName].concat(net.peers.map(p=>p.name)).filter(Boolean).map(n=>'<span class="peer"><span style="color:var(--green)">●</span>'+esc(n)+'</span>').join('');
  const tnote=MP.transport==="broadcast"?'※ローカル同期（同じPCの別タブのみ）':MP.transport==="trystero"?'P2P接続（設定不要）':'Firebase（安定版）';
  let host='';
  if(isHost){
    const cnt=[2,3,4].map(n=>'<button class="btn mini '+(state.count===n?'on':'')+'" onclick="G.setCount('+n+')">'+n+'席</button>').join('');
    const rnd=ROUND_OPTS.map(r=>'<button class="btn mini '+(state.maxRounds===r?'on':'')+'" onclick="G.setRounds('+r+')">'+r+'回</button>').join('');
    host='<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;"><b style="font-size:13px;">設定</b>'+gearBtn()+'</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">'+cnt+'</div><div class="hr"></div><div style="display:flex;gap:6px;flex-wrap:wrap;">'+rnd+'</div><div class="small sub" style="margin-top:8px;">'+startMoneyLabel()+' ／ 成功率 '+Math.round(state.winP*100)+'%（空席は開始時CPU）</div></div><button class="btn primary" onclick="G.startGame()">ゲーム開始</button>';
  } else host='<div class="center sub small" style="padding:8px;">ホストの開始を待っています…</div>';
  return '<span class="backlink" onclick="G.home()">← 退出</span>'
    +'<div class="panel center"><div class="small sub">部屋コード</div><div class="roomcode">'+esc(MP.room||'----')+'</div><div class="small sub" style="margin-top:4px;">友達にこのコードを共有。'+tnote+'</div></div>'
    +'<div class="panel"><b style="font-size:13px;">座席</b>'+rows+'</div>'
    +'<div class="panel"><b style="font-size:13px;">接続中</b><div class="peerline">'+(peers||'<span class="sub small">…</span>')+'</div></div>'+host;
}

/* ============================================================
   画面：ゲーム
   ============================================================ */
function topbar(){const rnd='ラウンド '+state.round+' / '+state.maxRounds;const vs=state.players.length>1?'<span class="chip on">'+state.players.length+'人</span>':'';return '<div class="topbar"><div class="meta"><b style="color:var(--text);font-size:13px;">チャレンジレース</b>'+vs+'<br>'+rnd+'</div><button class="gearBtn" onclick="G.openMenu()" aria-label="メニュー">⚙</button></div>';}
function rankPanel(){ if(state.players.length<2)return '';
  const idx=state.players.map((p,i)=>i).sort((a,b)=>state.players[b].peak-state.players[a].peak);
  let r='';idx.forEach((i,k)=>{const p=state.players[i];r+='<div class="rankRow"><span class="rankNo">'+(k+1)+'</span>'+pbadge(i+1,24)+'<div class="nm">'+esc(p.name)+(p.out?' <span class="small sub">OUT</span>':'')+(i===myPlayerIndex()?' ◂':'')+'</div><span class="amt">'+led(yen(p.peak),12,i===myPlayerIndex()?'c':'w')+'</span></div>';});
  return '<div class="panel"><b style="font-size:13px;">最高到達ランキング</b>'+r+'</div>';
}
function vDecide(){
  const di=activeDecideSeat();
  const meIdx=di!=null?di:myPlayerIndex();
  const me=state.players[meIdx]||state.players[0];
  let body;
  if(di!=null){
    const money=me.wallet,f=ui.pendFrac||0,bet=Math.floor(money*f);
    let pct='';STEPS.forEach(p=>pct+='<button class="pct '+(Math.round(f*100)===p?'on':'')+'" onclick="G.pick('+(p/100)+')">'+p+'%</button>');
    const seatNote=(net.localControlsAll&&state.players.filter(p=>!p.isCPU&&!p.out).length>1)?'<div class="small sub center" style="margin-bottom:6px;">▶ '+esc(me.name)+' の番（端末を回してください）</div>':'';
    body=seatNote+'<div class="panel"><b style="font-size:13px;">賭ける割合</b><div class="small sub" style="margin-top:4px;">'+Math.round(state.winP*100)+'%で賭け金ぶん増加・残りで減少。</div><div class="pctGrid" style="margin-top:10px;">'+pct+'</div><div class="hype" style="margin-top:12px;margin-bottom:0;"><div class="small sub">今回の賭け金</div><b>'+yen(bet)+'</b><div class="small sub" style="margin-top:4px;">成功 '+yen(money+bet)+' ／ 失敗 '+yen(money-bet)+'</div></div></div>'
      +'<button class="btn primary" onclick="G.confirm()">'+(bet>0?'勝負する':'賭けずに進む')+'</button>';
  } else {
    const pend=state.players.filter(p=>!p.isCPU&&!p.out&&!p.decided).map(p=>esc(p.name));
    body='<div class="panel center"><div style="font-size:15px;font-weight:900;">決定しました</div><div class="small sub" style="margin-top:6px;">'+(pend.length?'他のプレイヤーを待っています：'+pend.join('、'):'集計に進みます…')+'</div></div>';
  }
  return topbar()+wealthCard(me.wallet,me.peak)+rankPanel()+body;
}
function vJudging(){return topbar()+'<div class="judge"><div class="dice">🎲</div><div>'+led('判定中',25,'c')+'<span class="led c dots" style="font-size:25px"></span></div><div class="small sub">欲張った分だけ景色が跳ねる。</div></div>';}
function vReveal(){
  const meIdx=myPlayerIndex(),me=state.players[meIdx];
  let unlock='';if(me&&me.res&&me.res.tierUp){const t=TIERS[tierIndex(me.res.after)];unlock='<div class="unlockBanner"><div style="font-size:24px;line-height:1;margin-bottom:5px;">'+t.emoji+'</div>'+esc(t.name)+' に到達！</div>';}
  let hype='';if(me&&me.res){const r=me.res;if(r.action==='skip')hype='<div class="hype"><b>今回は温存。</b></div>';else if(r.win)hype='<div class="hype"><b>増加！</b><div class="small sub" style="margin-top:4px;">'+yen(r.before)+' → '+yen(r.after)+'</div></div>';else hype='<div class="hype"><b style="color:var(--red)">減少…</b><div class="small sub" style="margin-top:4px;">'+yen(r.before)+' → '+yen(r.after)+'</div></div>';}
  let rows='';state.players.forEach(p=>{const r=p.res||{action:'skip',before:p.wallet,after:p.wallet};const cls=r.action==='skip'?'skip':(r.win?'win':'lose');const tag=r.action==='out'?'OUT':(r.action==='skip'?'SKIP':(r.win?'WIN':'LOSE'));const diff=r.after-r.before;rows+='<div class="resRow">'+pbadge(p.id+1,24)+'<div class="nm">'+esc(p.name)+'</div><span class="outc '+cls+'">'+tag+'</span><span class="amt">'+(diff===0?led('±0円',13,'w'):led((diff>0?'+':'')+yen(diff),13,diff>0?'g':'r'))+'</span></div>';});
  const last=state.round>=state.maxRounds, anyOut=state.players.some(p=>p.out);
  const canNext=net.localControlsAll||MP.isHost;
  const label=(last||anyOut)?'最終結果へ':'次のラウンドへ';
  const nextBtn=canNext?'<button class="btn primary" onclick="G.next()">'+label+'</button>':'<div class="center sub small" style="padding:8px;">ホストの操作を待っています…</div>';
  return topbar()+unlock+hype+wealthCard(me?me.wallet:0,me?me.peak:0)+'<div class="panel"><b style="font-size:13px;">ラウンド結果</b>'+rows+'</div>'+rankPanel()+nextBtn;
}
function vEnd(){
  const idx=state.players.map((p,i)=>i).sort((a,b)=>state.players[b].peak-state.players[a].peak);
  let rows='';idx.forEach((i,k)=>{const p=state.players[i];const win=k===0;rows+='<div class="rankRow"><span class="rankNo">'+(k+1)+'</span>'+pbadge(i+1,26)+'<div class="nm">'+esc(p.name)+(win?' 👑':'')+(i===myPlayerIndex()?' ◂':'')+'</div><span class="amt">'+led(yen(p.peak),15,win?'g':(i===myPlayerIndex()?'c':'w'))+'</span></div>';});
  const me=state.players[myPlayerIndex()];const myPeak=me?me.peak:0;
  let save;
  if(scoreSavedTs){let bd='';getBoard().slice(0,10).forEach((e,k)=>{bd+='<div class="rankRow"><span class="rankNo">'+(k+1)+'</span><div class="nm">'+esc(e.name)+(e.ts===scoreSavedTs?' ◂':'')+'</div><span class="amt">'+led(yen(e.peak),13,e.ts===scoreSavedTs?'g':'w')+'</span></div>';});save='<div class="panel"><b style="font-size:13px;">🏆 端末内ランキング</b>'+bd+'</div>';}
  else save='<div class="panel"><b style="font-size:13px;">記録する</b><div class="small sub" style="margin-top:4px;">あなたの最高到達 '+yen(myPeak)+' を端末ランキングに登録。</div><div style="display:flex;gap:8px;margin-top:8px;"><input class="txt" data-uis="scoreName" maxlength="12" value="'+esc(ui.scoreName||net.myName||(me?me.name:''))+'" placeholder="名前" style="flex:1;"><button class="btn primary" style="width:auto;" onclick="G.saveScore()">記録</button></div></div>';
  const title=state.players.length>1?(idx[0]===myPlayerIndex()?'1位！':'レース終了'):'チャレンジ終了';
  return '<div class="center" style="padding:20px 0 8px;">'+led('RESULT',30)+'<div class="small sub" style="margin-top:6px;">'+title+'</div></div>'
    +wealthCard(myPeak,myPeak)
    +(state.players.length>1?'<div class="panel"><b style="font-size:13px;">最高到達ランキング</b>'+rows+'</div>':'')
    +save
    +'<button class="btn primary" onclick="G.again()">'+(MP.isHost||net.localControlsAll?'もう一度':'ロビーへ')+'</button>';
}

/* ============================================================
   モーダル
   ============================================================ */
function cfgModal(){ if(!ui.cfgOpen)return '';
  let inner;
  if(!ui.unlocked){
    inner='<div style="font-weight:900;font-size:15px;">⚙ 管理設定</div><div class="small sub" style="margin-top:4px;">初期金額の変更にはパスワードが必要です。</div>'
      +'<input class="txt" data-uis="pw" value="'+esc(ui.pw)+'" placeholder="パスワード" type="password" style="margin-top:12px;">'
      +'<button class="btn primary" style="margin-top:10px;" onclick="G.tryUnlock()">解錠</button>'
      +(ui.pwErr?'<div class="small" style="color:var(--red);margin-top:6px;">パスワードが違います</div>':'')
      +'<button class="btn" style="margin-top:8px;" onclick="G.closeCfg()">閉じる</button>';
  } else {
    const sm=START_OPTIONS.map(v=>'<button class="btn mini '+(state.startMoney===v?'on':'')+'" onclick="G.setStart('+v+')">'+yen(v)+'</button>').join('');
    const wp=[50,60,70,80,90,95].map(v=>'<button class="btn mini '+(Math.round(state.winP*100)===v?'on':'')+'" onclick="G.setWinP('+(v/100)+')">'+v+'%</button>').join('');
    inner='<div style="font-weight:900;font-size:15px;">⚙ 管理設定 <span class="led g" style="font-size:12px">解錠済</span></div>'
      +'<div style="margin-top:12px;font-weight:800;font-size:13px;">初期金額</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">'+sm+'</div>'
      +'<div style="margin-top:12px;font-weight:800;font-size:13px;">成功率</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">'+wp+'</div>'
      +'<button class="btn primary" style="margin-top:14px;" onclick="G.closeCfg()">閉じる</button>';
  }
  return '<div class="modal"><div class="inner panel">'+inner+'</div></div>';
}
function menuModal(){ if(!ui.menuOpen)return '';return '<div class="modal"><div class="inner panel"><div style="font-weight:900;font-size:15px;margin-bottom:10px;">メニュー</div><button class="btn danger" style="margin-bottom:8px;" onclick="G.openQuit()">'+(net.localControlsAll?'タイトルに戻る':'退出する')+'</button><button class="btn" onclick="G.closeMenu()">閉じる</button></div></div>';}
function quitModal(){ if(!ui.quitOpen)return '';return '<div class="modal"><div class="inner panel"><div style="font-weight:900;font-size:15px;margin-bottom:6px;">'+(net.localControlsAll?'タイトルに戻る':'退出する')+'</div><div class="small sub" style="margin-bottom:12px;">進行中のゲームから抜けます。</div><button class="btn danger" style="margin-bottom:8px;" onclick="G.home()">戻る</button><button class="btn" onclick="G.closeQuit()">続ける</button></div></div>';}

/* ============================================================
   描画
   ============================================================ */
const app=document.getElementById('app');
function render(){ if(!app)return; updateMySeat();
  let main;
  if(net.mode===null) main=vHome();
  else if(state===null) main='<div class="judge"><div>'+led(net.connecting?'接続中…':'部屋に接続中…',20,'c')+'</div></div>'+(net.error?'<div class="panel" style="color:var(--red)">'+esc(net.error)+'</div>':'')+'<div class="center" style="margin-top:10px;"><button class="btn" style="width:auto;" onclick="G.home()">ホームへ</button></div>';
  else if(state.phase==='lobby') main=vLobby();
  else if(state.phase==='decide') main=vDecide();
  else if(state.phase==='judging') main=vJudging();
  else if(state.phase==='reveal') main=vReveal();
  else if(state.phase==='end') main=vEnd();
  else main=vHome();
  app.innerHTML=main+cfgModal()+menuModal()+quitModal();
  applyBg();
  // 演出（reveal入場時に一度）
  if(state&&state.phase==='reveal'&&state.round!==fxRound){ fxRound=state.round; triggerRevealFx(); }
  if(state&&state.phase!=='reveal'&&state.phase!=='judging') { /* keep fxRound */ }
  // ホスト：判定タイマー
  if(MP.isHost&&state&&state.phase==='judging'&&!judgePending){ judgePending=true; setTimeout(()=>{ judgePending=false; applyResults(state); commit(); }, 850); }
}

/* ============================================================
   操作
   ============================================================ */
const G={
  mOffline(){startOffline();}, mOnline(){startHost(onlineTransport());}, mJoin(){startJoin(onlineTransport());}, mLocal(){startHost('broadcast');},
  home(){goHome();},
  setCount(n){submit({type:'setcount',n});}, setRounds(v){submit({type:'setrounds',v});},
  setType(i,k){submit({type:'settype',i,kind:k});}, setLevel(i,lv){submit({type:'setlevel',i,lv});},
  setStart(v){submit({type:'setstart',v});}, setWinP(v){submit({type:'setwinp',v});},
  claim(i){submit({type:'claimSeat',seat:i,name:net.myName||ui.homeName||'参加者'});}, release(i){submit({type:'releaseSeat',seat:i});},
  startGame(){submit({type:'startgame'});},
  pick(f){ui.pendFrac=f;render();},
  confirm(){const seat=activeDecideSeat();if(seat==null)return;submit({type:'decide',seat,frac:ui.pendFrac||0});ui.pendFrac=0.5;},
  next(){submit({type:'next'});},
  again(){submit({type:'restart'});scoreSavedTs=0;fxRound=-1;},
  saveScore(){const me=state.players[myPlayerIndex()];const e=addBoard(ui.scoreName||net.myName||(me?me.name:'名無し'),me?me.peak:0);scoreSavedTs=e.ts;render();},
  openCfg(){ui.cfgOpen=true;ui.pwErr=false;render();}, closeCfg(){ui.cfgOpen=false;render();},
  tryUnlock(){if(ui.pw===PASSWORD){ui.unlocked=true;ui.pwErr=false;}else{ui.pwErr=true;}render();},
  openMenu(){ui.menuOpen=true;render();}, closeMenu(){ui.menuOpen=false;render();},
  openQuit(){ui.menuOpen=false;ui.quitOpen=true;render();}, closeQuit(){ui.quitOpen=false;render();}
};
window.G=G;
document.addEventListener('input',e=>{const t=e.target;if(t.dataset.uis!==undefined)ui[t.dataset.uis]=t.value;else if(t.dataset.seatname!==undefined&&state&&state.seats){state.seats[+t.dataset.seatname].name=t.value;}},true);
document.addEventListener('pointerdown',e=>spawnTapFx(e.clientX,e.clientY),{passive:true});
render();
</script>
</body>
</html>
