<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>新しいゲーム（雛形）</title>
<style>
  body{margin:0;min-height:100vh;color:#EAE6D9;font-family:system-ui,sans-serif;
    background:#10211E;padding:20px;max-width:520px;margin:0 auto}
  button{font:inherit;background:#1F3B35;color:#EAE6D9;border:1px solid #2C4B44;
    border-radius:9px;padding:9px 14px;cursor:pointer}
  .gold{background:#C8A24B;color:#0E1F1C;border:none}
  input{font:inherit;background:#0E1F1C;color:#EAE6D9;border:1px solid #2C4B44;border-radius:8px;padding:8px}
  .mut{color:#8FA89F;font-size:13px}
</style>
</head>
<body>
<div id="app"></div>

<!-- 同期部品（共通・パスは置き場所に合わせる） -->
<script src="../../lib/firebase-config.js"></script>
<script src="../../lib/mp.js"></script>

<script>
/* ============================================================
   新しいオンラインゲームの雛形（ホスト権威型）
   ------------------------------------------------------------
   この3つだけ自分のゲームに合わせて書き換えれば動きます:
     1) initialState()           … ゲーム開始時の状態
     2) applyAction(state, a)    … アクションを状態に適用（ホストで実行）
     3) render(state, myTurn)    … 状態を画面に描く
   通信(MP)・ロビー・部屋コードは mp.js が面倒を見ます。
   ============================================================ */

// ---- 1) 初期状態 -------------------------------------------
function initialState(players){
  return { phase:"play", turn:0, players, count:0 };
}

// ---- 2) アクション適用（ホストのみ実行） --------------------
function applyAction(s, a){
  if(a.type==="tap" && a.seat===s.turn){
    s.count++;
    s.turn=(s.turn+1)%s.players.length;
  }
}

// ---- 3) 描画 -----------------------------------------------
function view(s){
  const me=s.players[net.mySeat];
  const myTurn = net.localControlsAll || s.turn===net.mySeat;
  return `
    <h2>サンプル: 順番にタップ</h2>
    <p class="mut">あなた: ${me?me.name:"観戦"} ／ 現在の手番: ${s.players[s.turn].name}</p>
    <p>カウント: <b>${s.count}</b></p>
    ${myTurn ? `<button class="gold" data-act="tap">タップ（+1して次の人へ）</button>`
             : `<p class="mut">${s.players[s.turn].name} の操作待ち…</p>`}`;
}

/* ===== ここから下は定型（基本そのまま流用可） ===== */
let state=null, ui={homeName:"",homeRoom:""};
let net={mode:null,mySeat:null,myName:"",peers:[],localControlsAll:false};
const app=document.getElementById("app");
function commit(){ MP.pushState(state); render(); }
function submit(a){ a=Object.assign({_by:MP.clientId},a);
  if(MP.isHost){ applyAction(state,a); commit(); } else { MP.sendAction(a); } }

async function host(transport){
  MP.onState(s=>{ if(!MP.isHost){ state=s; render(); }});
  MP.onAction(a=>{ applyAction(state,a); commit(); });
  await MP.create({transport, name:ui.homeName||"ホスト"});
  net.mode="online"; net.localControlsAll = transport==="none";
  // デモ用に即2人で開始（実際はロビーを作る）
  const players=[{name:ui.homeName||"あなた",owner:MP.clientId},{name:"CPU/相手",owner:null}];
  state=initialState(players); commit();
}
async function join(transport){
  MP.onState(s=>{ state=s; render(); });
  await MP.join({transport, room:(ui.homeRoom||"").toUpperCase(), name:ui.homeName||"P"});
  net.mode="online";
}
function updateMySeat(){
  if(!state) return;
  if(net.localControlsAll){ net.mySeat=state.turn; return; }
  const i=state.players.findIndex(p=>p&&p.owner===MP.clientId); net.mySeat=i>=0?i:null;
}
function render(){
  if(net.mode===null){
    app.innerHTML=`
      <h2>雛形ゲーム</h2>
      <input data-uis="homeName" placeholder="名前"><br><br>
      <button data-act="offline">1台で</button>
      <button data-act="lhost">ローカルで部屋作成</button><br><br>
      <input data-uis="homeRoom" placeholder="ABCD" maxlength="4">
      <button data-act="ljoin">参加</button>`;
    return;
  }
  if(!state){ app.innerHTML="接続中…"; return; }
  updateMySeat();
  app.innerHTML=view(state);
}
app.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]"); if(!el) return;
  const a=el.dataset.act;
  if(a==="offline") return host("none");
  if(a==="lhost")   return host("broadcast");
  if(a==="ljoin")   return join("broadcast");
  submit({type:a, seat:net.localControlsAll?state.turn:net.mySeat});
});
app.addEventListener("input",e=>{ if(e.target.dataset.uis!==undefined) ui[e.target.dataset.uis]=e.target.value; });
render();
</script>
</body>
</html>
